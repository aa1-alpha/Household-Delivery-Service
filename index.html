<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>My Delivery Service</title>
    <script src="script.js"></script>
  </head>
  <body>
    
    <h1 style="background-color: White">Welcome to my delivery service</h1>
    <p>Please fill out the form below</p>
    <form>
      <label for="name">First and Last Name:</label>
      <input id="name" type="text" name="fname" required>
      <p></p><br>

      <label for="Item_Needed">What Item do you need:</label>
      <input id="Item_Needed" type="text" name="Item_Needed" required><br>
      <p></p>
      
      <label for="When_Needed">When do you need this delivered:</label>
      <input id="When_Needed" type="datetime-local" name="When_Needed" required><br>
      <p></p>
      
      <label for='Where_Needed'>Where do you need this delivered:</label>
      <input id='Where_Needed' type='text' name="Where_Needed" required><br>
      <p></p>

      <button type="submit">Submit Form</button>
      <button type="reset">Reset Form</button>
    </form>

    <p>By Audvik Agarwal, Version 1.0.1</p>

    <a href='Audvik.html'>Do Not Open</a>
  </body>
</html>
